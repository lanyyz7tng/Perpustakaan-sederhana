<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>booklab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f4f4; overflow-x: hidden; }
        
        
        .zoom-in {
            animation: zoomIn 0.8s ease-out;
        }

        @keyframes zoomIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        
        .sidebar {
            background-color: #4A69FF;
            height: 100vh;
            color: white;
            padding-top: 20px;
            position: fixed;
            width: 250px;
        }

        .nav-link {
            color: rgba(255,255,255,0.8);
            margin: 10px 15px;
            border-radius: 10px;
            transition: all 0.3s;
            font-weight: 500;
        }

        
        .nav-link:hover {
            background-color: white;
            color: #4A69FF !important;
            transform: translateX(10px) scale(1.05);
        }

        .nav-link.active {
            background-color: rgba(255,255,255,0.2);
            color: white;
        }

        
        .main-content { margin-left: 260px; padding: 20px;}

        
        .card-custom {
            border-radius: 5px;
            border: none;
            color: white;
            padding: 20px;
            padding-top: 25px;
            transition: transform 0.3s;
            background: linear-gradient(135deg, #ffffff 0%, #ffffff 100%);
            box-shadow: 0 10px 20px rgba(74, 105, 255, 0.2);
            width: 25vw;
            height: 25vh;
        }

        .card-custom:hover {
            transform: scale(1.05); 
        }

        .card-custom1 {
            border-radius: 8px;
            border: none;
            color: white;
            padding: 15px;
            padding-top: 4px;
            transition: transform 0.3s;
            background: linear-gradient(135deg, #ffffff 0%, #ffffff 100%);
            box-shadow: 0 10px 20px rgba(74, 105, 255, 0.2);
            width: 78vw;
            height: 5vh;
        }

        .d-flex {
            margin-left: 138vh;
        }

        h1 {font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;}
    </style>
</head>
<body>

<div class="sidebar">
    <div class="text-center mb-4">
        <h4 class="fw-bold"><i class="bi bi-book-half me-2"></i></i>Lab Book</h4>
    </div>
    <nav class="nav flex-column">
        <a class="nav-link active" href="index.html"><i class="bi bi-house me-2"></i></i> Beranda</a>
        <a class="nav-link" href="daftar_buku.html"><i class="bi bi-book me-2"></i></i> Daftar Buku</a>
        <a class="nav-link" href="peminjam.html"><i class="bi bi-card-checklist me-2"></i></i> Peminjaman</a>
        <a class="nav-link" href="anggota.html"><i class="bi bi-people-fill me-2"></i> Anggota</a>
        <a class="nav-link" href="login.html"><i class="bi bi-people-fill me-2"></i> Log out</a>
    </nav>
</div>

<div class="main-content zoom-in">
    <h1 style="margin-left: 2;">Selamat datang, Admin!</h1>
    <h3>Ringkasan</h3>
    <br>
    <div class="row g-4 mb-4">
    <div class="col-md-4">
        <div class="card-custom">
            <h5 style="color: black;">Total Buku</h5>
            <h1 id="count-buku" style="color: black;">0</h1> <hr style="width: 40vh; border-top: 3px solid rgb(69, 68, 68);">
        </div>
    </div>

    <div class="col-md-4">
        <div class="card-custom">
            <h5 style="color: black;">Total Peminjaman</h5>
            <h1 id="count-peminjam" style="color: black;">0</h1> <hr style="width: 40vh; border-top: 3px solid rgb(69, 68, 68);">
        </div>
    </div>

    <div class="col-md-4">
        <div class="card-custom">
            <h5 style="color: black;">Total Anggota</h5>
            <h1 id="count-anggota" style="color: black;">0</h1> <hr style="width: 40vh; border-top: 3px solid rgb(69, 68, 68);">
        </div>
    </div>
</div>

    <h1>Aktivitas hari ini</h1>
<div id="container-aktivitas">
<div class="row g-2 mb-2" >
        <div class="col-md-4">
            <div class="card-custom1">
            </div>
        </div>
</div>
</div>
<script src="daftar.js"></script> </body>
</html>
</body>
</html>
